name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Build packages
        run: pnpm -r run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build example
        run: pnpm --filter tiny-event-bus-react-demo run build

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Verify coverage badge is up to date
        run: |
          node scripts/generate-coverage-badge.mjs
          git diff --exit-code badges/ || (echo "Coverage badge is out of date. Run 'pnpm run badge' and commit." && exit 1)
